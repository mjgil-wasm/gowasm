<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>gowasm browser compatibility tests</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #11141b;
    color: #edf0f5;
    font: 15px/1.6 "Iosevka Term", "IBM Plex Mono", monospace;
  }

  h1 {
    margin: 0 0 12px;
    color: #9fd2ff;
  }

  p {
    margin: 0 0 16px;
    color: #b3bfd1;
    max-width: 80ch;
  }

  #results {
    white-space: pre-wrap;
    margin-bottom: 16px;
  }

  #summary {
    margin-bottom: 16px;
    font-weight: 700;
  }

  .pass {
    color: #74d99f;
  }

  .fail {
    color: #ff8f8f;
  }
</style>
</head>
<body>
<h1>browser compatibility tests</h1>
<p>
  This harness checks the frozen Chromium support floor in the current browser and exercises
  synthetic unsupported and limited-compatibility environments for the shell compatibility layer.
</p>
<div id="results"></div>
<div id="summary"></div>
<script type="module" src="./test-browser-compatibility-runner.js"></script>
</body>
</html>
