<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>gowasm browser capability security tests</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #11141b;
    color: #edf0f5;
    font: 15px/1.6 "Iosevka Term", "IBM Plex Mono", monospace;
  }

  h1 {
    margin: 0 0 12px;
    color: #9fd2ff;
  }

  p {
    margin: 0 0 16px;
    color: #b3bfd1;
    max-width: 80ch;
  }

  #results {
    white-space: pre-wrap;
    margin-bottom: 16px;
  }

  #summary {
    margin-bottom: 16px;
    font-weight: 700;
  }

  .pass {
    color: #74d99f;
  }

  .fail {
    color: #ff8f8f;
  }

<body>
<h1>browser capability security tests</h1>

<div id="results"></div>
<div id="summary"></div>
<script type="module" src="./test-browser-capability-security-runner.js"></script>
