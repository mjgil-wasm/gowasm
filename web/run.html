<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gowasm — Go to WASM Demo</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --panel: #16162a;
        --ink: #e0e0e0;
        --muted: #888;
        --accent: #0077aa;
        --accent-hover: #0099cc;
        --line: #333;
        --subline: #2a2a3e;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      header h1 {
        margin: 0;
        font-size: 1rem;
        color: #a0e0ff;
      }

      header p {
        margin: 0;
        font-size: 0.75rem;
        color: var(--muted);
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      @media (max-width: 768px) {
        main {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--line);
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-header {
        padding: 0.5rem 1rem;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        border-bottom: 1px solid var(--subline);
        background: var(--panel);
      }

      textarea {
        flex: 1;
        background: #0f0f1e;
        color: #d0d0e0;
        border: none;
        padding: 1rem;
        font-family: inherit;
        font-size: 0.85rem;
        line-height: 1.6;
        resize: none;
        outline: none;
      }

      textarea::placeholder {
        color: #555;
      }

      .output {
        flex: 1;
        padding: 1rem;
        font-size: 0.8rem;
        overflow-y: auto;
        background: #0f0f1e;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .toolbar {
        padding: 0.75rem 1rem;
        border-top: 1px solid var(--subline);
        background: var(--panel);
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        padding: 0.5rem 1.25rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 4px;
        font-family: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button.secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      button.secondary:hover {
        border-color: var(--muted);
        color: var(--ink);
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      #status {
        margin-left: auto;
        font-size: 0.8rem;
        color: var(--muted);
      }

      #status.ok {
        color: #66ff99;
      }

      #status.error {
        color: #ff6666;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>gowasm</h1>
      <p>Browser shell for the Rust-powered Go runtime</p>
    </header>

    <main>
      <section class="panel">
        <div class="panel-header">Go Source</div>
        <textarea id="source" spellcheck="false"></textarea>
        <div class="toolbar">
          <button id="run-button" type="button">Run</button>
          <button id="test-button" class="secondary" type="button">Test</button>
          <button id="format-button" class="secondary" type="button">Format</button>
          <button id="lint-button" class="secondary" type="button">Lint</button>
          <span id="status">Booting worker…</span>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">Output</div>
        <pre id="output" class="output"></pre>
      </section>
    </main>

    <script type="module" src="./run.js"></script>
  </body>
</html>
